apiVersion: v1
kind: Namespace
metadata:
  name: travelhub
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-admin-secret
  namespace: travelhub
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: authservice-app-secret
  namespace: travelhub
type: Opaque
stringData:
  SECRET_KEY: local-dev-secret-key
  COGNITO_REGION: us-east-1
  COGNITO_USER_POOL_ID: local-dev
  COGNITO_CLIENT_ID: local-dev
  COGNITO_CLIENT_SECRET: local-dev
---
apiVersion: v1
kind: Secret
metadata:
  name: authservice-db-secret
  namespace: travelhub
type: Opaque
stringData:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: authservice_db
  DB_USER: authservice_app
  DB_PASSWORD: authservice_dev
---
apiVersion: v1
kind: Secret
metadata:
  name: booking-db-secret
  namespace: travelhub
type: Opaque
stringData:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: booking_db
  DB_USER: booking_app
  DB_PASSWORD: booking_dev
---
