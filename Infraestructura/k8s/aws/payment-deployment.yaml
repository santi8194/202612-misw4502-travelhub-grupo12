apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  labels:
    app: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
        - name: payment
          image: ${ECR_REGISTRY_DEV}/payment:${GITHUB_SHA}
          ports:
            - containerPort: 8002
          env:
            - name: PAYMENT_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: DB_HOST
            - name: PAYMENT_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: DB_PORT
            - name: PAYMENT_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: DB_NAME
            - name: PAYMENT_DB_USER
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: DB_USER
            - name: PAYMENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: DB_PASSWORD
            - name: PAYMENT_MODE
              value: "wompi"
          startupProbe:
            httpGet:
              path: /health
              port: 8002
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
