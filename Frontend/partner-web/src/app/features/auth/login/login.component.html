<div class="login-page">
    <div class="login-card">
        <div class="logo-wrapper">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M19 3H5c-1.11 0-2 .89-2 2v14c0 1.11.89 2 2 2h14c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm-2 14H7V7h10v10z" />
                    <path d="M9 13h2v2H9zm4 0h2v2h-2zm-4-4h2v2H9zm4 0h2v2h-2z" />
                </svg>
            </div>
        </div>

        <h2>{{ 'LOGIN.TITLE' | translate }}</h2>
        <p class="subtitle">{{ 'LOGIN.SUBTITLE' | translate }}</p>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" data-testid="login-form">
            <div *ngIf="errorMessage" class="error-banner" data-testid="login-error">
                {{ errorMessage }}
            </div>

            <div class="form-group">
                <label>{{ 'LOGIN.EMAIL_LABEL' | translate }}</label>
                <div class="input-wrapper">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                    <input type="email" formControlName="email" [placeholder]="'LOGIN.EMAIL_PLACEHOLDER' | translate" data-testid="input-email">
                </div>
            </div>

            <div class="form-group">
                <label>{{ 'LOGIN.PASSWORD_LABEL' | translate }}</label>
                <div class="input-wrapper">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                        </path>
                    </svg>
                    <input type="password" formControlName="password" [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate" data-testid="input-password">
                </div>
            </div>

            <div class="form-actions">
                <label class="checkbox-container">
                    <input type="checkbox" formControlName="rememberMe">
                    <span class="checkmark"></span>
                    {{ 'LOGIN.REMEMBER_ME' | translate }}
                </label>
                <a href="#" class="forgot-link" (click)="$event.preventDefault()">{{ 'LOGIN.FORGOT_PASSWORD' | translate }}</a>
            </div>

            <button type="submit" class="submit-btn" [disabled]="!loginForm.valid || isLoading" data-testid="btn-login">
                <span *ngIf="isLoading" data-testid="login-loading">{{ 'LOGIN.LOADING' | translate }}</span>
                <span *ngIf="!isLoading">{{ 'LOGIN.SUBMIT' | translate }}</span>
            </button>
        </form>
    </div>
</div>
