version: "3.9"

services:
  catalog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travelhub-catalog
    ports:
      - "8001:80"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=catalog_db
      - DB_USER=catalog
      - DB_PASSWORD=catalog
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelhub-net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: travelhub-catalog-db
    environment:
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
      POSTGRES_DB: catalog_db
    ports:
      - "5433:5432"
    volumes:
      - catalog_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - travelhub-net

volumes:
  catalog_postgres_data:

networks:
  travelhub-net:
    driver: bridge
