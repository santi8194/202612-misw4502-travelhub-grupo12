name: travelhub-dev

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: travelhub-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  authservice:
    image: ${ECR_REGISTRY_DEV}/authservice:${AUTHSERVICE_IMAGE_TAG:-latest}
    container_name: travelhub-authservice
    environment:
      SECRET_KEY: ${AUTHSERVICE_SECRET_KEY}
      DB_HOST: ${AUTHSERVICE_DB_HOST}
      DB_PORT: ${AUTHSERVICE_DB_PORT}
      DB_NAME: ${AUTHSERVICE_DB_NAME}
      DB_USER: ${AUTHSERVICE_DB_USER}
      DB_PASSWORD: ${AUTHSERVICE_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  catalog:
    image: ${ECR_REGISTRY_DEV}/catalog:${CATALOG_IMAGE_TAG:-latest}
    container_name: travelhub-catalog
    environment:
      DB_HOST: ${CATALOG_DB_HOST}
      DB_PORT: ${CATALOG_DB_PORT}
      DB_NAME: ${CATALOG_DB_NAME}
      DB_USER: ${CATALOG_DB_USER}
      DB_PASSWORD: ${CATALOG_DB_PASSWORD}
      ENABLE_EVENTS: "false"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  booking:
    image: ${ECR_REGISTRY_DEV}/booking:${BOOKING_IMAGE_TAG:-latest}
    container_name: travelhub-booking
    environment:
      DB_HOST: ${BOOKING_DB_HOST}
      DB_PORT: ${BOOKING_DB_PORT}
      DB_NAME: ${BOOKING_DB_NAME}
      DB_USER: ${BOOKING_DB_USER}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      CATALOG_SERVICE_URL: ${BOOKING_CATALOG_SERVICE_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  search:
    image: ${ECR_REGISTRY_DEV}/search:${SEARCH_IMAGE_TAG:-latest}
    container_name: travelhub-search
    environment:
      REPOSITORY_TYPE: ${SEARCH_REPOSITORY_TYPE:-postgres}
      DB_HOST: ${SEARCH_DB_HOST}
      DB_PORT: ${SEARCH_DB_PORT}
      DB_NAME: ${SEARCH_DB_NAME}
      DB_USER: ${SEARCH_DB_USER}
      DB_PASSWORD: ${SEARCH_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

networks:
  travelhub-dev-net:
    driver: bridge
