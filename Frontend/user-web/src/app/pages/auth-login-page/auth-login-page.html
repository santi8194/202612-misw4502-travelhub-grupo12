<div class="auth-page">
  <app-header mode="compact"></app-header>

  <section class="auth-shell">
    <div class="auth-wrapper">
      <div class="brand">
        <h1>TravelHub</h1>
        <p>Bienvenido de nuevo a tu compañero de viajes</p>
      </div>

      <article class="auth-card">
        <h2 class="card-title">Iniciar Sesión</h2>

        <p class="subtitle">
          Ingresa tus credenciales para acceder a tu cuenta
        </p>

        <form class="auth-form" (ngSubmit)="onSubmit()">
          <label>
            Correo Electrónico

            <div class="input-wrapper" [class.input-wrapper--error]="errors().email">
              <input
                type="email"
                [value]="form().email"
                (input)="updateField('email', $any($event.target).value)"
                (blur)="markTouched('email')"
                placeholder="tu@ejemplo.com"
              />
            </div>

            @if (errors().email) {
              <small class="field-error">{{ errorMessages().email }}</small>
            }
          </label>

          <label>
            Contraseña

            <div class="input-wrapper password-input" [class.input-wrapper--error]="errors().password">
              <input
                [type]="showPassword() ? 'text' : 'password'"
                [value]="form().password"
                (input)="updateField('password', $any($event.target).value)"
                (blur)="markTouched('password')"
                placeholder="Ingresa tu contraseña"
              />

              <button
                type="button"
                class="password-toggle"
                (click)="togglePassword()"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M2.062 12.348a1 1 0 0 1 0-.696
                    10.75 10.75 0 0 1 19.876 0
                    1 1 0 0 1 0 .696
                    10.75 10.75 0 0 1-19.876 0"
                  />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>

            @if (errors().password) {
              <small class="field-error">{{ errorMessages().password }}</small>
            }
          </label>

          <div class="options-row">
            <label class="remember">
              <input type="checkbox" (change)="onRememberMe()" />
              Recordarme
            </label>

            <a class="forgot-password" (click)="onForgotPassword(); $event.preventDefault()">
              ¿Olvidaste tu contraseña?
            </a>
          </div>

          <button class="primary" type="submit" [disabled]="loading()">
            {{ loading() ? 'Ingresando...' : '→ Iniciar Sesión' }}
          </button>

          <div class="divider">
            <span>O continuar con</span>
          </div>

          <button type="button" class="google-btn" (click)="onGoogleSignIn()">
            Continuar con Google
          </button>
        </form>

        <p class="hint">
          ¿No tienes una cuenta?
          <a routerLink="/auth/registro">Regístrate →</a>
        </p>
      </article>
    </div>
  </section>

  <app-footer></app-footer>
</div>
