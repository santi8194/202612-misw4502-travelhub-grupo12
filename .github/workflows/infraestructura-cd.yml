name: Infraestructura CD

on:
  push:
    branches:
      - main
    paths:
      - 'Infraestructura/terraform/**'

concurrency:
  group: infraestructura-cd-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: '1.10.0'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'
  AWS_REGION: us-east-1

jobs:
  deploy-container-registry:
    name: Deploy container_registry
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/container_registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          role-session-name: gha-infra-cd-container-registry
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/container_registry/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-eks:
    name: Deploy eks
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-container-registry
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/eks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          role-session-name: gha-infra-cd-eks
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/eks/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan