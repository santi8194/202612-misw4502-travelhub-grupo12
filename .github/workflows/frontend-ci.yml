name: Frontend CI

on:
  pull_request:
    paths:
      - "Frontend/partner-web/**"
      - "Frontend/user-web/**"
      - ".github/workflows/frontend-ci.yml"

concurrency:
  group: frontend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [partner-web, user-web]
    defaults:
      run:
        working-directory: Frontend/${{ matrix.project }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if project changed
        id: check_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'Frontend/${{ matrix.project }}/**'
              - '.github/workflows/frontend-ci.yml'

      - name: Setup Node.js
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        if: steps.check_changes.outputs.changed == 'true'
        run: npm ci

      - name: Run tests
        if: steps.check_changes.outputs.changed == 'true'
        run: npm run test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build project
        if: steps.check_changes.outputs.changed == 'true'
        run: npm run build
