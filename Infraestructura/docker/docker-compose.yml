name: travelhub-dev

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: travelhub-nginx
    ports:
      - "5001:8000"
    environment:
      - CATALOG_SERVICE_URL=http://catalog-api:80/catalog
      - REDIS_HOST=redis-db
      - RABBITMQ_HOST=rabbitmq-broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - DB_USER=booking_user
      - DB_PASSWORD=booking_password
      - DB_HOST=booking-db
      - DB_PORT=5432
      - DB_NAME=booking_db
    depends_on:
      booking-db:
        condition: service_healthy
      redis-db:
        condition: service_started
      rabbitmq-broker:
        condition: service_started
    networks:
      - microservices-network

  booking-saga-worker:
    build:
      context: ../../Backend/booking
      dockerfile: Dockerfile
    command: python /src/Booking/modulos/saga_reservas/infraestructura/consumidor_evt_saga.py
    environment:
      - REDIS_HOST=redis-db
      - RABBITMQ_HOST=rabbitmq-broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - PYTHONPATH=/src
      - PYTHONUNBUFFERED=1
      - DB_USER=booking_user
      - DB_PASSWORD=booking_password
      - DB_HOST=booking-db
      - DB_PORT=5432
      - DB_NAME=booking_db
    depends_on:
      booking-db:
        condition: service_healthy
      redis-db:
        condition: service_started
      rabbitmq-broker:
        condition: service_started
      booking-api:
        condition: service_started
    networks:
      - microservices-network

  notification-api:
    build:
      context: ../../Backend/notification
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis-db
      - RABBITMQ_HOST=rabbitmq-broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
    depends_on:
      - redis-db
      - rabbitmq-broker
    networks:
      - travelhub-dev-net

  authservice:
    image: ${ECR_REGISTRY_DEV}/authservice:${AUTHSERVICE_IMAGE_TAG:-latest}
    container_name: travelhub-authservice
    environment:
      SECRET_KEY: ${AUTHSERVICE_SECRET_KEY}
      DB_HOST: ${AUTHSERVICE_DB_HOST}
      DB_PORT: ${AUTHSERVICE_DB_PORT}
      DB_NAME: ${AUTHSERVICE_DB_NAME}
      DB_USER: ${AUTHSERVICE_DB_USER}
      DB_PASSWORD: ${AUTHSERVICE_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  catalog:
    image: ${ECR_REGISTRY_DEV}/catalog:${CATALOG_IMAGE_TAG:-latest}
    container_name: travelhub-catalog
    environment:
      DB_HOST: ${CATALOG_DB_HOST}
      DB_PORT: ${CATALOG_DB_PORT}
      DB_NAME: ${CATALOG_DB_NAME}
      DB_USER: ${CATALOG_DB_USER}
      DB_PASSWORD: ${CATALOG_DB_PASSWORD}
      ENABLE_EVENTS: "false"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  booking:
    image: ${ECR_REGISTRY_DEV}/booking:${BOOKING_IMAGE_TAG:-latest}
    container_name: travelhub-booking
    environment:
      DB_HOST: ${BOOKING_DB_HOST}
      DB_PORT: ${BOOKING_DB_PORT}
      DB_NAME: ${BOOKING_DB_NAME}
      DB_USER: ${BOOKING_DB_USER}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      CATALOG_SERVICE_URL: ${BOOKING_CATALOG_SERVICE_URL}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  auth-api:
    build:
      context: ../../Backend/authservice
      dockerfile: Dockerfile
    ports:
      - "8003:8000"
    networks:
      - microservices-network

  catalog-api:
    build:
      context: ../../Backend/catalog
      dockerfile: Dockerfile
    ports:
      - "8005:80"
    environment:
      - RABBITMQ_HOST=rabbitmq-broker
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - DB_HOST=catalog-db
      - DB_PORT=5432
      - DB_NAME=catalog_db
      - DB_USER=catalog_user
      - DB_PASSWORD=catalog_password
    depends_on:
      - rabbitmq-broker
      - catalog-db
    networks:
      - microservices-network

  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_password
      POSTGRES_DB: catalog_db
    ports:
      - "5434:5432"
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U catalog_user -d catalog_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  user-web:
    build:
      context: ../../Frontend/user-web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    networks:
      - travelhub-dev-net

networks:
  travelhub-dev-net:
    driver: bridge

volumes:
  booking_db_data:
  pms_db_data:
  catalog_db_data:
