name: Backend CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "Backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  discover-services:
    name: Discover Backend Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      service_count: ${{ steps.discover.outputs.service_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build service matrix
        id: discover
        shell: bash
        run: |
          mapfile -t services < <(
            find Backend -mindepth 1 -maxdepth 1 -type d \
              \( -exec test -f "{}/requirements.txt" \; -o -exec test -f "{}/pyproject.toml" \; \) \
              -printf '%f\n' | sort
          )

          if [ "${#services[@]}" -eq 0 ]; then
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'service_count=0' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -cs '{service: .}')

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "service_count=${#services[@]}" >> "$GITHUB_OUTPUT"

  test-service:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: discover-services
    if: ${{ needs.discover-services.outputs.service_count != '0' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-services.outputs.matrix) }}
    defaults:
      run:
        working-directory: Backend/${{ matrix.service }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            Backend/${{ matrix.service }}/requirements.txt
            Backend/${{ matrix.service }}/pyproject.toml

      - name: Validate service contract
        shell: bash
        run: |
          if [ ! -f requirements.txt ] && [ ! -f pyproject.toml ]; then
            echo "::error::Service '${{ matrix.service }}' must include requirements.txt or pyproject.toml."
            exit 1
          fi

          if [ ! -d tests ]; then
            echo "::error::Service '${{ matrix.service }}' must include a tests/ directory."
            exit 1
          fi

          if ! find tests -type f -name '*.py' | grep -q .; then
            echo "::error::Service '${{ matrix.service }}' must include at least one Python test file inside tests/."
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            python -m pip install .
          fi

          python -m pip install pytest pytest-cov

      - name: Run pytest
        shell: bash
        run: |
          mkdir -p test-results
          python -m pytest tests \
            --junitxml=test-results/junit.xml \
            --cov=. \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term \
            --cov-fail-under=80

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: Backend/${{ matrix.service }}/test-results/junit.xml
          if-no-files-found: warn
