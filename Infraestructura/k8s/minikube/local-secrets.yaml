---
apiVersion: v1
kind: Secret
metadata:
  name: payment-app-runtime-secrets
  namespace: travelhub
type: Opaque
stringData:
  WOMPI_PUBLIC_KEY: local-dev
  WOMPI_PRIVATE_KEY: local-dev
  WOMPI_INTEGRITY_SECRET: local-dev
  WOMPI_EVENT_SECRET: local-dev
---
apiVersion: v1
