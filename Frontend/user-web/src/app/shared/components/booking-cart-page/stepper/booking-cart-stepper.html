<div class="stepper-wrap" data-testid="stepper">
  <div class="step"
    [class.step-active]="isCart()"
    [class.step-completed-green]="isResult()">
    <div class="step-icon"
      [class.step-icon-active]="isCart()"
      [class.step-icon-completed-green]="isResult()">
      @if (isResult()) {
        <svg class="step-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.8 12.4l2.5 2.5 5.9-5.9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      } @else {
        <svg class="step-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.5" fill="none" stroke="currentColor" stroke-width="1.8" />
          <path d="M5 20c1.8-3.2 4.1-4.8 7-4.8s5.2 1.6 7 4.8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      }
    </div>
    <span class="step-label">Huéspedes</span>
  </div>

  <div class="step-line"></div>

  <div class="step"
    [class.step-inactive]="isCart()"
    [class.step-completed-green]="isResult()">
    <div class="step-icon"
      [class.step-icon-completed-green]="isResult()">
      @if (isResult()) {
        <svg class="step-svg" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.8 12.4l2.5 2.5 5.9-5.9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      } @else {
        <svg class="step-svg" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3.5" y="6" width="17" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.8" />
          <path d="M3.5 10h17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <path d="M7.5 14.5h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      }
    </div>
    <span class="step-label">Pago</span>
  </div>

  <div class="step-line"></div>

  <div class="step"
    [class.step-inactive]="isCart()"
    [class.step-active]="isResult()">
    <div class="step-icon"
      [class.step-icon-active]="isResult()">
      <svg class="step-svg" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="8.5" fill="none" stroke="currentColor" stroke-width="1.8" />
        <path d="M8.3 12.2l2.4 2.4 5-5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <span class="step-label">Confirmación</span>
  </div>
</div>
