version: "3.9"

services:
  search:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: travelhub-search
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelhub-net
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: travelhub-postgres-db
    environment:
      POSTGRES_USER: travelhub
      POSTGRES_PASSWORD: travelhub
      POSTGRES_DB: travelhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelhub -d travelhub"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - travelhub-net

