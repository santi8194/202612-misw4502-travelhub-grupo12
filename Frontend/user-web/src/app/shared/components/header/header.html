<header class="header-shell">
	<div class="header-content">
		<div class="brand">TravelHub</div>

		@if (mode() === 'compact') {
			<app-compact-search-bar />
		} @else {
			<app-search-bar />
		}

		<div class="actions" aria-label="Preferencias de usuario">
			<button class="action-text">
				<svg viewBox="0 0 24 24">
					<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/>
					<path d="M3.5 12h17" stroke="currentColor" stroke-width="1.6"/>
					<path d="M12 3c2.2 2.3 3.5 5.6 3.5 9S14.2 18.7 12 21" stroke="currentColor" stroke-width="1.6" fill="none"/>
					<path d="M12 3C9.8 5.3 8.5 8.6 8.5 12s1.3 6.7 3.5 9" stroke="currentColor" stroke-width="1.6" fill="none"/>
				</svg>
				<span>Español (SP)</span>
			</button>

			<button class="action-text">
				<svg viewBox="0 0 24 24">
					<path d="M12 4v16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
					<path d="M16.4 8.2c0-1.8-1.9-3.2-4.4-3.2s-4.4 1.4-4.4 3.2 1.6 2.7 4.4 3.3c2.8.6 4.4 1.5 4.4 3.3s-1.9 3.2-4.4 3.2-4.4-1.4-4.4-3.2" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round"/>
				</svg>
				<span>USD</span>
			</button>

			<div class="user-menu">
				<button class="menu-btn">
					<svg viewBox="0 0 24 24">
						<path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
					</svg>
				</button>

				<div class="avatar">
					<svg viewBox="0 0 24 24" aria-hidden="true">
					<circle cx="12" cy="8" r="3.5" fill="none" stroke="currentColor" stroke-width="1.7"/>
					<path d="M5 20c1.7-3.2 4-4.8 7-4.8S17.3 16.8 19 20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
				</svg>
				</div>
			</div>
		</div>
	</div>
</header>
