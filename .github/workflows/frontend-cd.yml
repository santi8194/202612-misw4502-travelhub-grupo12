name: Frontend CD

on:
  push:
    branches:
      - develop
      - main
    tags:
      - "v*-web"
    paths:
      - "Frontend/partner-web/**"
      - "Frontend/user-web/**"
      - ".github/workflows/frontend-cd.yml"
  workflow_dispatch:

concurrency:
  group: frontend-cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: "1.10.0"

jobs:
  discover-changes:
    name: Discover changed frontends
    runs-on: ubuntu-latest
    outputs:
      partner_changed: ${{ steps.check.outputs.partner_changed }}
      user_changed: ${{ steps.check.outputs.user_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changes
        id: check
        run: |
          BASE_SHA=${{ github.event.before }}
          HEAD_SHA=${{ github.sha }}

          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "partner_changed=true" >> $GITHUB_OUTPUT
            echo "user_changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --name-only $BASE_SHA $HEAD_SHA | grep -q "^Frontend/partner-web/\|^\.github/workflows/frontend-cd\.yml"; then
            echo "partner_changed=true" >> $GITHUB_OUTPUT
          else
            echo "partner_changed=false" >> $GITHUB_OUTPUT
          fi

          if git diff --name-only $BASE_SHA $HEAD_SHA | grep -q "^Frontend/user-web/\|^\.github/workflows/frontend-cd\.yml"; then
            echo "user_changed=true" >> $GITHUB_OUTPUT
          else
            echo "user_changed=false" >> $GITHUB_OUTPUT
          fi

  deploy-partner-web:
    name: Deploy partner-web
    runs-on: ubuntu-latest
    environment: dev
    needs: discover-changes
    if: needs.discover-changes.outputs.partner_changed == 'true'
    defaults:
      run:
        working-directory: Frontend/partner-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/v}
            VERSION=${TAG_NAME%-web}
          else
            VERSION="dev-${{ github.sha }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/partner-web/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Get Infrastructure Outputs
        id: tf-outputs
        working-directory: Infraestructura/terraform/stacks/frontends
        run: |
          terraform init -reconfigure
          echo "BUCKET_NAME=$(terraform output -raw partner_web_bucket)" >> $GITHUB_OUTPUT
          echo "CLOUDFRONT_ID=$(terraform output -raw partner_web_cloudfront_id)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Set version
        run: |
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.ts
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.prod.ts

      - name: Build project
        run: npm run build

      - name: Sync versioned assets to S3
        run: |
          aws s3 sync dist/partner-web/browser/ s3://${{ steps.tf-outputs.outputs.BUCKET_NAME }} \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload non-cacheable entrypoint
        run: |
          aws s3 cp dist/partner-web/browser/index.html s3://${{ steps.tf-outputs.outputs.BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.tf-outputs.outputs.CLOUDFRONT_ID }} --paths "/*"

  deploy-user-web:
    name: Deploy user-web
    runs-on: ubuntu-latest
    environment: dev
    needs: discover-changes
    if: needs.discover-changes.outputs.user_changed == 'true'
    defaults:
      run:
        working-directory: Frontend/user-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/v}
            VERSION=${TAG_NAME%-web}
          else
            VERSION="dev-${{ github.sha }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/user-web/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Get Infrastructure Outputs
        id: tf-outputs
        working-directory: Infraestructura/terraform/stacks/frontends
        run: |
          terraform init -reconfigure
          echo "BUCKET_NAME=$(terraform output -raw user_web_bucket)" >> $GITHUB_OUTPUT
          echo "CLOUDFRONT_ID=$(terraform output -raw user_web_cloudfront_id)" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Set version
        run: |
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.ts
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.prod.ts

      - name: Build project
        run: npm run build

      - name: Sync versioned assets to S3
        run: |
          aws s3 sync dist/user-web/browser/ s3://${{ steps.tf-outputs.outputs.BUCKET_NAME }} \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload non-cacheable entrypoint
        run: |
          aws s3 cp dist/user-web/browser/index.html s3://${{ steps.tf-outputs.outputs.BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.tf-outputs.outputs.CLOUDFRONT_ID }} --paths "/*"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [discover-changes]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/v}
            VERSION=${TAG_NAME%-web}
          else
            VERSION="dev-${{ github.sha }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build partner-web
        working-directory: Frontend/partner-web
        run: |
          npm ci
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.ts
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.prod.ts
          npm run build
          cd dist/partner-web/browser
          zip -r ${{ github.workspace }}/partner-web-build.zip .

      - name: Build user-web
        working-directory: Frontend/user-web
        run: |
          npm ci
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.ts
          sed -i "s/version: 'local'/version: '${{ steps.get_version.outputs.VERSION }}'/g" src/environments/environment.prod.ts
          npm run build
          cd dist/user-web/browser
          zip -r ${{ github.workspace }}/user-web-build.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            partner-web-build.zip
            user-web-build.zip
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
