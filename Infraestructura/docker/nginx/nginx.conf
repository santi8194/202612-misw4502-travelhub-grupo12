worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  upstream authservice_upstream {
    server authservice:8000;
  }

  upstream booking_upstream {
    server booking:8000;
  }

  upstream catalog_upstream {
    server catalog:8000;
  }

  upstream search_upstream {
    server search:8000;
  }

  server {
    listen 80;
    server_name _;

    location = / {
      return 200 'travelhub-dev-nginx';
      add_header Content-Type text/plain;
    }

    location /auth {
      proxy_pass http://authservice_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/booking(/|$)(.*) {
      rewrite ^/booking(/|$)(.*) /$2 break;
      proxy_pass http://booking_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/search(/|$)(.*) {
      rewrite ^/search(/|$)(.*) /$2 break;
      proxy_pass http://search_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/catalog(/|$)(.*) {
      rewrite ^/catalog(/|$)(.*) /$2 break;
      proxy_pass http://catalog_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
