<div class="search-results-page">

  <app-header></app-header>

  <main class="results-main" data-testid="results-main">

    <!-- Encabezado de resultados -->
    <section class="results-header" data-testid="results-header">
      <h1 class="results-title" data-testid="results-title">
        Stays in {{ ciudadBusqueda() }}
      </h1>
      <p class="results-subtitle" data-testid="results-subtitle">
        {{ totalResultados() }}+ stays in {{ ciudadBusqueda() }}
      </p>
    </section>

    <hr class="results-divider" data-testid="results-divider" />

    <!-- Grid de hospedajes -->
    <section class="results-grid" data-testid="results-grid">
      @for (hospedaje of hospedajes(); track hospedaje.id_propiedad) {
        <app-hospedaje-card [hospedaje]="hospedaje" />
      }
    </section>

  </main>

  <app-footer></app-footer>

</div>
