name: Infra CD PROD

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  TERRAFORM_VERSION: '1.10.0'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME_DEV: ${{ vars.EKS_CLUSTER_NAME_DEV }}
  K8S_NAMESPACE_DEV: ${{ vars.K8S_NAMESPACE_DEV }}

jobs:
  deploy-container-registry:
    name: Deploy container_registry
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/container_registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/container_registry/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-database:
    name: Deploy database
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-container-registry
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/database

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure -backend-config="../../environments/dev/database/backend.tfvars"

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/database/terraform.tfvars" -var-file="database.secrets.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-eks:
    name: Deploy eks
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-database
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/eks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Preconfigure VPC CNI prefix delegation
        run: |
          set -euo pipefail

          CLUSTER_NAME="${EKS_CLUSTER_NAME_DEV:-grupo12-travelhub-eks}"

          if ! aws eks describe-cluster \
            --name "${CLUSTER_NAME}" \
            --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "EKS cluster '${CLUSTER_NAME}' does not exist yet; skipping pre-Terraform VPC CNI reconciliation."
            exit 0
          fi

          aws eks update-kubeconfig \
            --name "${CLUSTER_NAME}" \
            --region "${AWS_REGION}"

          kubectl set env daemonset/aws-node \
            -n kube-system \
            ENABLE_PREFIX_DELEGATION=true \
            WARM_PREFIX_TARGET=1

          kubectl rollout status daemonset/aws-node \
            -n kube-system \
            --timeout=300s

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/eks/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Reconcile VPC CNI prefix delegation
        run: |
          set -euo pipefail

          CLUSTER_NAME="${EKS_CLUSTER_NAME_DEV:-grupo12-travelhub-eks}"

          aws eks update-kubeconfig \
            --name "${CLUSTER_NAME}" \
            --region "${AWS_REGION}"

          kubectl set env daemonset/aws-node \
            -n kube-system \
            ENABLE_PREFIX_DELEGATION=true \
            WARM_PREFIX_TARGET=1

          kubectl rollout status daemonset/aws-node \
            -n kube-system \
            --timeout=300s

      - name: Validate EKS node capacity
        run: |
          set -euo pipefail

          PREFIX_DELEGATION=$(kubectl get daemonset aws-node \
            -n kube-system \
            -o jsonpath="{.spec.template.spec.containers[?(@.name=='aws-node')].env[?(@.name=='ENABLE_PREFIX_DELEGATION')].value}")

          if [ "${PREFIX_DELEGATION}" != "true" ]; then
            echo "::error::Expected aws-node ENABLE_PREFIX_DELEGATION=true, found '${PREFIX_DELEGATION:-unset}'."
            exit 1
          fi

          MEDIUM_NODES=$(kubectl get nodes \
            -l node.kubernetes.io/instance-type=t3.medium \
            --no-headers 2>/dev/null | wc -l | tr -d ' ')

          if [ "${MEDIUM_NODES}" -lt 1 ]; then
            echo "::error::Expected at least one t3.medium node after EKS apply."
            kubectl get nodes -o wide
            exit 1
          fi

          MAX_PODS=$(kubectl get nodes \
            -l node.kubernetes.io/instance-type=t3.medium \
            -o jsonpath="{range .items[*]}{.status.allocatable.pods}{'\n'}{end}" \
            | sort -n \
            | tail -1)

          if [ -z "${MAX_PODS}" ] || [ "${MAX_PODS}" -le 11 ]; then
            echo "::error::Expected t3.medium allocatable pods to be greater than 11, found '${MAX_PODS:-unset}'."
            kubectl describe nodes
            exit 1
          fi

          echo "Validated VPC CNI prefix delegation and t3.medium node capacity. Max allocatable pods: ${MAX_PODS}."

      - name: Reconcile EKS control plane log group
        env:
          CLUSTER_NAME: grupo12-travelhub-eks
          RETENTION_DAYS: "7"
        run: |
          set -euo pipefail

          LOG_GROUP="/aws/eks/${CLUSTER_NAME}/cluster"

          for i in $(seq 1 30); do
            LOG_GROUP_ARN=$(aws logs describe-log-groups \
              --log-group-name-prefix "${LOG_GROUP}" \
              --query "logGroups[?logGroupName=='${LOG_GROUP}'].logGroupArn | [0]" \
              --output text)

            if [ "${LOG_GROUP_ARN}" != "None" ] && [ -n "${LOG_GROUP_ARN}" ]; then
              aws logs put-retention-policy \
                --log-group-name "${LOG_GROUP}" \
                --retention-in-days "${RETENTION_DAYS}"

              aws logs tag-resource \
                --resource-arn "${LOG_GROUP_ARN}" \
                --tags '{"owner":"grupo12","managed-by":"aws","terraform-stack":"eks"}'

              echo "EKS log group reconciled: ${LOG_GROUP}"
              exit 0
            fi

            sleep 10
          done

          echo "Log group ${LOG_GROUP} not found yet; skipping reconciliation without failing deploy."

  deploy-ingress:
    name: Deploy ingress
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-eks
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/ingress

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Validate EKS remote state outputs
        run: |
          set -euo pipefail

          TFVARS_FILE="../../environments/dev/ingress/dev.tfvars"
          EKS_STATE_BUCKET=$(awk -F '=' '/^[[:space:]]*eks_state_bucket[[:space:]]*=/{gsub(/[ "]/, "", $2); print $2}' "${TFVARS_FILE}")
          EKS_STATE_KEY=$(awk -F '=' '/^[[:space:]]*eks_state_key[[:space:]]*=/{gsub(/[ "]/, "", $2); print $2}' "${TFVARS_FILE}")

          if [ -z "${EKS_STATE_BUCKET:-}" ] || [ -z "${EKS_STATE_KEY:-}" ]; then
            echo "::error file=${TFVARS_FILE}::Missing eks_state_bucket or eks_state_key required by ingress."
            exit 1
          fi

          if ! aws s3 cp "s3://${EKS_STATE_BUCKET}/${EKS_STATE_KEY}" eks-remote-state.json >/dev/null; then
            echo "::error::Unable to read EKS remote state from s3://${EKS_STATE_BUCKET}/${EKS_STATE_KEY}. Deploy the EKS stack before ingress or fix the ingress EKS state configuration."
            exit 1
          fi

          REQUIRED_OUTPUTS=(
            eks_cluster_id
            eks_cluster_endpoint
            eks_cluster_certificate_authority_data
            eks_subnet_ids
          )

          MISSING_OUTPUTS=()
          for output_name in "${REQUIRED_OUTPUTS[@]}"; do
            if ! jq -e --arg output_name "${output_name}" '.outputs[$output_name] != null' eks-remote-state.json >/dev/null; then
              MISSING_OUTPUTS+=("${output_name}")
            fi
          done

          if [ "${#MISSING_OUTPUTS[@]}" -gt 0 ]; then
            echo "::error::EKS remote state s3://${EKS_STATE_BUCKET}/${EKS_STATE_KEY} is missing required output(s): ${MISSING_OUTPUTS[*]}. Deploy or re-apply the EKS stack before ingress."
            echo "Available EKS remote state outputs:"
            jq -r '.outputs | keys[]?' eks-remote-state.json
            exit 1
          fi

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/ingress/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate required GitHub variables
        run: |
          set -euo pipefail

          if [ -z "${EKS_CLUSTER_NAME_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'EKS_CLUSTER_NAME_DEV'."
            exit 1
          fi

          if [ -z "${K8S_NAMESPACE_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'K8S_NAMESPACE_DEV'."
            exit 1
          fi

      - name: Update kubeconfig
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME_DEV}" \
            --region "${AWS_REGION}"

      - name: Ensure backend namespace exists
        run: |
          set -euo pipefail

          if ! kubectl get namespace "${K8S_NAMESPACE_DEV}" >/dev/null 2>&1; then
            kubectl create namespace "${K8S_NAMESPACE_DEV}"
          fi

      - name: Apply backend infrastructure manifests
        run: |
          set -euo pipefail
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/rabbitmq-broker-deployment.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/rabbitmq-broker-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/redis-db-deployment.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/redis-db-service.yaml

      - name: Apply backend service manifests
        run: |
          set -euo pipefail
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/authservice-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/booking-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/catalog-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/notification-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/payment-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/partner-management-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/pms-integration-service.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/search-service.yaml

      - name: Apply ingress manifests
        run: |
          set -euo pipefail
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/backend-ingress.yaml
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f ../../../k8s/aws/authservice-ingress.yaml

  deploy-frontends:
    name: Deploy frontends
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/frontends

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/frontends/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
