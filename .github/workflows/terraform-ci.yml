name: Infraestructura CI

on:
  pull_request:
    paths:
      - 'Infraestructura/terraform/**'

concurrency:
  group: infraestructura-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TERRAFORM_VERSION: '1.10.0'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'
  AWS_REGION: us-east-1

jobs:
  terraform-fmt:
    name: Terraform Fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform fmt -check
        run: terraform fmt -check -recursive Infraestructura/terraform

  terraform-validate-plan:
    name: Validate and Plan (${{ matrix.stack.name }})
    runs-on: ubuntu-latest
    needs: terraform-fmt
    strategy:
      fail-fast: false
      matrix:
        stack:
          - name: container_registry
            working_directory: Infraestructura/terraform/stacks/container_registry
            tfvars_file: ../../environments/dev/container_registry/dev.tfvars
          - name: eks
            working_directory: Infraestructura/terraform/stacks/eks
            tfvars_file: ../../environments/dev/eks/dev.tfvars

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.stack.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -input=false -lock=false -no-color -var-file="${{ matrix.stack.tfvars_file }}"
