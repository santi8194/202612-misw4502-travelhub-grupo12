<app-navbar></app-navbar>
<div class="home-container">

    <div class="welcome-card" *ngIf="!loading && !error && user">
        <div class="welcome-icon">🏨</div>
        <div class="welcome-content">
            <h2 class="welcome-title">¡Bienvenido, {{ user.email }}!</h2>
            <p class="welcome-subtitle" *ngIf="user.partner_id; else noPartner">
                Estás gestionando el hotel
                <span class="partner-badge">{{ user.partner_id }}</span>
            </p>
            <ng-template #noPartner>
                <p class="welcome-subtitle no-partner">
                    No tienes un hotel asignado aún.
                </p>
            </ng-template>
        </div>
    </div>

    <div class="welcome-loading" *ngIf="loading">
        <span>Cargando...</span>
    </div>

    <div class="welcome-error" *ngIf="error">
        <span>No se pudo cargar la información del usuario.</span>
    </div>

</div>
