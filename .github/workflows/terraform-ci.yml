name: Terraform CI

on:
  pull_request:
    paths:
      - 'Infraestructura/terraform/**'

concurrency:
  group: terraform-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX || 'infraestructura/terraform' }}
  TF_WORKING_DIR: Infraestructura/terraform
  TERRAFORM_VERSION: 1.8.5
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          role-session-name: gha-terraform-ci
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="workspace_key_prefix=${TF_STATE_KEY_PREFIX}"

      - name: Select dev workspace
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -input=false -lock=false -no-color -var-file=env/dev.tfvars
