name: Backend CD PROD

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      base_sha:
        required: false
        type: string
      head_sha:
        required: true
        type: string

permissions:
  contents: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  EKS_CLUSTER_NAME_DEV: ${{ vars.EKS_CLUSTER_NAME_DEV }}
  K8S_NAMESPACE_DEV: ${{ vars.K8S_NAMESPACE_DEV }}
  AUTHSERVICE_DB_SECRET_NAME_DEV: travelhub/dev/authservice/db-credentials
  BOOKING_DB_SECRET_NAME_DEV: travelhub/dev/booking/db-credentials
  CATALOG_DB_SECRET_NAME_DEV: travelhub/dev/catalog/db-credentials
  PAYMENT_DB_SECRET_NAME_DEV: travelhub/dev/payment/db-credentials
  PAYMENT_APP_SECRET_NAME_DEV: travelhub/dev/payment/app-secrets
  PMS_INTEGRATION_DB_SECRET_NAME_DEV: travelhub/dev/pms-integration/db-credentials
  PARTNER_MANAGEMENT_DB_SECRET_NAME_DEV: travelhub/dev/partner-management/db-credentials
  NOTIFICATION_DB_SECRET_NAME_DEV: travelhub/dev/notification/db-credentials
  SEARCH_DB_SECRET_NAME_DEV: travelhub/dev/search/db-credentials
  SERVICE_EXCLUSIONS_FILE: .github/backend-cd.exclusions.json

jobs:
  discover-services:
    name: Discover changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      service_count: ${{ steps.discover.outputs.service_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deployment matrix
        id: discover
        shell: bash
        env:
          EVENT_NAME: ${{ inputs.event_name }}
          BASE_SHA: ${{ inputs.base_sha }}
          HEAD_SHA: ${{ inputs.head_sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import subprocess
          import sys

          exclusions_path = os.environ["SERVICE_EXCLUSIONS_FILE"]
          event_name = os.environ["EVENT_NAME"]
          base_sha = os.environ.get("BASE_SHA", "")
          head_sha = os.environ["HEAD_SHA"]
          github_ref = os.environ.get("GITHUB_REF", "")
          repo_root = Path.cwd()
          backend_dir = repo_root / "Backend"
          manifests_dir = repo_root / "Infraestructura" / "k8s" / "aws"

          try:
              with open(exclusions_path, "r", encoding="utf-8") as fh:
                  exclusions = json.load(fh)
          except Exception as exc:
              print(f"::error file={exclusions_path}::Failed to load exclusion list: {exc}")
              sys.exit(1)

          excluded_services = set(exclusions.get("exclude", []))

          deploy_all = False
          changed_files = []

          if event_name == "workflow_dispatch":
              deploy_all = True
          elif github_ref.startswith("refs/tags/v"):
              deploy_all = True
          elif not base_sha or base_sha == "0000000000000000000000000000000000000000":
              deploy_all = True
          else:
              result = subprocess.run(
                  ["git", "diff", "--name-only", base_sha, head_sha],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              changed_files = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          discovered_services = []
          for service_dir in sorted(path for path in backend_dir.iterdir() if path.is_dir()):
              service_name = service_dir.name
              if service_name in excluded_services:
                  continue

              dockerfile = service_dir / "Dockerfile"
              deployment_manifest = manifests_dir / f"{service_name}-deployment.yaml"
              service_manifest = manifests_dir / f"{service_name}-service.yaml"

              if not dockerfile.is_file():
                  continue

              if not deployment_manifest.is_file() or not service_manifest.is_file():
                  missing = []
                  if not deployment_manifest.is_file():
                      missing.append(str(deployment_manifest.relative_to(repo_root)).replace("\\", "/"))
                  if not service_manifest.is_file():
                      missing.append(str(service_manifest.relative_to(repo_root)).replace("\\", "/"))
                  missing_paths = ", ".join(missing)
                  print(
                      f"::warning::Service '{service_name}' has a Dockerfile but is not prod-CD-supported because these manifests are missing: {missing_paths}"
                  )
                  continue

              discovered_services.append(
                  {
                      "service_name": service_name,
                      "service_folder": f"Backend/{service_name}",
                      "dockerfile_path": f"Backend/{service_name}/Dockerfile",
                      "ecr_repository": service_name,
                      "deployment_manifest": f"Infraestructura/k8s/aws/{service_name}-deployment.yaml",
                      "service_manifest": f"Infraestructura/k8s/aws/{service_name}-service.yaml",
                  }
              )

          selected_services = []
          global_change_prefixes = [
              ".github/workflows/backend-cd-base.yml",
              ".github/workflows/backend-cd-dev.yml",
              ".github/workflows/backend-cd-prod.yml",
              ".github/backend-cd.exclusions.json",
          ]

          for service in discovered_services:
              if deploy_all:
                  selected_services.append(service)
                  continue

              if any(
                  changed.startswith(prefix)
                  for changed in changed_files
                  for prefix in global_change_prefixes
              ):
                  selected_services.append(service)
                  continue

              watch_paths = [
                  f"{service['service_folder']}/",
                  service["dockerfile_path"],
                  service["deployment_manifest"],
                  service["service_manifest"],
              ]
              if service["service_name"] == "booking":
                  watch_paths.append("Infraestructura/k8s/aws/booking-saga-worker-deployment.yaml")
              if any(
                  changed.startswith(prefix)
                  for changed in changed_files
                  for prefix in watch_paths
              ):
                  selected_services.append(service)

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps({'include': selected_services})}\n")
              fh.write(f"service_count={len(selected_services)}\n")
          PY

  deploy-service-prod:
    name: Deploy ${{ matrix.service_name }} to EKS
    runs-on: ubuntu-latest
    environment: dev
    needs: discover-services
    if: ${{ needs.discover-services.outputs.service_count != '0' }}
    concurrency:
      group: backend-cd-${{ matrix.service_name }}-prod
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-services.outputs.matrix) }}
    env:
      SERVICE_FOLDER: ${{ matrix.service_folder }}
      DOCKERFILE_PATH: ${{ matrix.dockerfile_path }}
      DEPLOYMENT_MANIFEST: ${{ matrix.deployment_manifest }}
      SERVICE_MANIFEST: ${{ matrix.service_manifest }}
      RENDERED_DEPLOYMENT_MANIFEST: /tmp/${{ matrix.service_name }}-deployment.rendered.yaml
      SAGA_WORKER_DEPLOYMENT_MANIFEST: Infraestructura/k8s/aws/booking-saga-worker-deployment.yaml
      RENDERED_SAGA_WORKER_DEPLOYMENT_MANIFEST: /tmp/booking-saga-worker-deployment.rendered.yaml
      SERVICE_NAME: ${{ matrix.service_name }}
      ECR_REPOSITORY: ${{ matrix.ecr_repository }}
      HEALTHCHECK_PATH: /health
      AUTHSERVICE_SECRET_KEY_DEV: ${{ secrets.AUTHSERVICE_SECRET_KEY_DEV }}
      COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
      COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
      COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
      COGNITO_CLIENT_SECRET: ${{ secrets.COGNITO_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${DOCKERFILE_PATH}" ]; then
            echo "::error file=${DOCKERFILE_PATH}::Missing Dockerfile for service '${SERVICE_NAME}'. Expected file '${DOCKERFILE_PATH}' was not found."
            exit 1
          fi

          if [ ! -f "${DEPLOYMENT_MANIFEST}" ]; then
            echo "::error file=${DEPLOYMENT_MANIFEST}::Missing Kubernetes Deployment manifest. Expected file '${DEPLOYMENT_MANIFEST}' was not found."
            exit 1
          fi

          if [ ! -f "${SERVICE_MANIFEST}" ]; then
            echo "::error file=${SERVICE_MANIFEST}::Missing Kubernetes Service manifest. Expected file '${SERVICE_MANIFEST}' was not found."
            exit 1
          fi

          if [ "${SERVICE_NAME}" = "booking" ] && [ ! -f "${SAGA_WORKER_DEPLOYMENT_MANIFEST}" ]; then
            echo "::error file=${SAGA_WORKER_DEPLOYMENT_MANIFEST}::Missing booking saga worker deployment manifest."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install PyYAML

      - name: Validate required GitHub variables
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION:-}" ]; then
            echo "::error::Missing required GitHub variable 'AWS_REGION'."
            exit 1
          fi

          if [ -z "${EKS_CLUSTER_NAME_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'EKS_CLUSTER_NAME_DEV'."
            exit 1
          fi

          if [ -z "${K8S_NAMESPACE_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'K8S_NAMESPACE_DEV'."
            exit 1
          fi

          if [ "${SERVICE_NAME}" = "authservice" ] && [ -z "${AUTHSERVICE_SECRET_KEY_DEV:-}" ]; then
            echo "::error::Missing required GitHub secret 'AUTHSERVICE_SECRET_KEY_DEV' for authservice deployment."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ECR registry
        shell: bash
        run: |
          set -euo pipefail

          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          if [ -z "${AWS_ACCOUNT_ID:-}" ] || [ "${AWS_ACCOUNT_ID}" = "None" ]; then
            echo "::error::Could not resolve AWS account id for ECR registry."
            exit 1
          fi

          ECR_REGISTRY_DEV="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          echo "ECR_REGISTRY_DEV=${ECR_REGISTRY_DEV}" >> "${GITHUB_ENV}"

      - name: Validate manifest naming and image template
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys
          import yaml

          expected = os.environ["SERVICE_NAME"]
          expected_image = "${ECR_REGISTRY_DEV}/" + expected + ":${GITHUB_SHA}"
          deployment_file = os.environ["DEPLOYMENT_MANIFEST"]
          service_file = os.environ["SERVICE_MANIFEST"]

          try:
              with open(deployment_file, "r", encoding="utf-8") as f:
                  dep = yaml.safe_load(f)
              with open(service_file, "r", encoding="utf-8") as f:
                  svc = yaml.safe_load(f)
          except Exception as exc:
              print(f"::error::Failed to parse Kubernetes manifests: {exc}")
              sys.exit(1)

          try:
              dep_name = dep["metadata"]["name"]
              container = dep["spec"]["template"]["spec"]["containers"][0]
              container_name = container["name"]
              image_value = container["image"]
              service_name = svc["metadata"]["name"]
          except Exception as exc:
              print(f"::error::Manifest structure is invalid or missing required fields: {exc}")
              sys.exit(1)

          if dep_name != expected:
              print(f"::error file={deployment_file}::Deployment name mismatch. Expected '{expected}', found '{dep_name}'.")
              sys.exit(1)

          if container_name != expected:
              print(f"::error file={deployment_file}::Container name mismatch. Expected '{expected}', found '{container_name}'.")
              sys.exit(1)

          if service_name != expected:
              print(f"::error file={service_file}::Service name mismatch. Expected '{expected}', found '{service_name}'.")
              sys.exit(1)

          if image_value != expected_image:
              print(f"::error file={deployment_file}::Image template mismatch. Expected '{expected_image}', found '{image_value}'.")
              sys.exit(1)

          print("Manifest naming and image template OK")
          PY

      - name: Validate ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "::error::ECR repository '${ECR_REPOSITORY}' does not exist in region '${AWS_REGION}'. Run infrastructure CD (Terraform) before backend deployment."
            exit 1
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker build \
            -f "${DOCKERFILE_PATH}" \
            -t "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:${GITHUB_SHA}" \
            -t "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:latest" \
            "${SERVICE_FOLDER}"; then
            echo "::error::Docker build failed for service '${SERVICE_NAME}' using Dockerfile '${DOCKERFILE_PATH}'."
            exit 1
          fi

      - name: Push Docker image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker push "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:${GITHUB_SHA}"; then
            echo "::error::Failed to push image tag '${GITHUB_SHA}' to ECR repository '${ECR_REPOSITORY}'."
            exit 1
          fi

          if ! docker push "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:latest"; then
            echo "::error::Failed to push image tag 'latest' to ECR repository '${ECR_REPOSITORY}'."
            exit 1
          fi

      - name: Render deployment manifest with ECR registry and SHA
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys

          src = os.environ["DEPLOYMENT_MANIFEST"]
          dst = os.environ["RENDERED_DEPLOYMENT_MANIFEST"]
          registry = os.environ.get("ECR_REGISTRY_DEV", "")
          sha = os.environ.get("GITHUB_SHA", "")

          if not registry:
              print("::error::ECR_REGISTRY_DEV is required to render the deployment manifest.")
              sys.exit(1)

          if not sha:
              print("::error::GITHUB_SHA is required to render the deployment manifest.")
              sys.exit(1)

          try:
              with open(src, "r", encoding="utf-8") as f:
                  content = f.read()
          except Exception as exc:
              print(f"::error file={src}::Failed to read deployment manifest: {exc}")
              sys.exit(1)

          rendered = content.replace("${ECR_REGISTRY_DEV}", registry)
          rendered = rendered.replace("${GITHUB_SHA}", sha)

          if "${ECR_REGISTRY_DEV}" in rendered or "${GITHUB_SHA}" in rendered:
              print("::error::Deployment manifest still contains unresolved placeholders after rendering.")
              sys.exit(1)

          with open(dst, "w", encoding="utf-8") as f:
              f.write(rendered)
          PY

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: |
          set -euo pipefail
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME_DEV}" \
            --region "${AWS_REGION}"

      - name: Ensure namespace exists
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl get namespace "${K8S_NAMESPACE_DEV}" >/dev/null 2>&1; then
            kubectl create namespace "${K8S_NAMESPACE_DEV}"
          fi

      - name: Reconcile service DB secret
        if: ${{ matrix.service_name == 'authservice' || matrix.service_name == 'booking' || matrix.service_name == 'catalog' || matrix.service_name == 'payment' || matrix.service_name == 'pms-integration' || matrix.service_name == 'partner-management' || matrix.service_name == 'notification' || matrix.service_name == 'search' }}
        shell: bash
        env:
          DB_SECRET_ENV_FILE: /tmp/${{ matrix.service_name }}-db-secret.env
        run: |
          set -euo pipefail

          case "${SERVICE_NAME}" in
            authservice)
              SECRET_MANAGER_ID="${AUTHSERVICE_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="authservice-db-secret"
              ;;
            booking)
              SECRET_MANAGER_ID="${BOOKING_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="booking-db-secret"
              ;;
            catalog)
              SECRET_MANAGER_ID="${CATALOG_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="catalog-db-secret"
              ;;
            payment)
              SECRET_MANAGER_ID="${PAYMENT_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="payment-db-secret"
              ;;
            pms-integration)
              SECRET_MANAGER_ID="${PMS_INTEGRATION_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="pms-integration-db-secret"
              ;;
            partner-management)
              SECRET_MANAGER_ID="${PARTNER_MANAGEMENT_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="partner-management-db-secret"
              ;;
            notification)
              SECRET_MANAGER_ID="${NOTIFICATION_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="notification-db-secret"
              ;;
            search)
              SECRET_MANAGER_ID="${SEARCH_DB_SECRET_NAME_DEV}"
              K8S_SECRET_NAME="search-db-secret"
              ;;
          esac

          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${SECRET_MANAGER_ID}" \
            --query 'SecretString' \
            --output text)

          export SECRET_JSON DB_SECRET_ENV_FILE
          python - <<'PY'
          import json
          import os
          import sys

          secret = json.loads(os.environ["SECRET_JSON"])
          env_file = os.environ["DB_SECRET_ENV_FILE"]
          required_keys = {
              "DB_HOST": secret.get("host"),
              "DB_PORT": secret.get("port"),
              "DB_NAME": secret.get("dbname"),
              "DB_USER": secret.get("username"),
              "DB_PASSWORD": secret.get("password"),
          }
          missing = [key for key, value in required_keys.items() if value in (None, "")]
          if missing:
              print("::error::Secrets Manager secret is missing required keys: " + ", ".join(missing))
              sys.exit(1)

          with open(env_file, "w", encoding="utf-8") as fh:
              for key, value in required_keys.items():
                  fh.write(f"{key}={value}\n")
          PY

          kubectl create secret generic "${K8S_SECRET_NAME}" \
            --namespace "${K8S_NAMESPACE_DEV}" \
            --from-env-file="${DB_SECRET_ENV_FILE}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Reconcile authservice app secret
        if: ${{ matrix.service_name == 'authservice' }}
        shell: bash
        run: |
          set -euo pipefail
          kubectl create secret generic authservice-app-secret \
            --namespace "${K8S_NAMESPACE_DEV}" \
            --from-literal=SECRET_KEY="${AUTHSERVICE_SECRET_KEY_DEV}" \
            --from-literal=COGNITO_REGION="${COGNITO_REGION}" \
            --from-literal=COGNITO_USER_POOL_ID="${COGNITO_USER_POOL_ID}" \
            --from-literal=COGNITO_CLIENT_ID="${COGNITO_CLIENT_ID}" \
            --from-literal=COGNITO_CLIENT_SECRET="${COGNITO_CLIENT_SECRET}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Reconcile payment app secret
        if: ${{ matrix.service_name == 'payment' }}
        shell: bash
        env:
          PAYMENT_APP_ENV_FILE: /tmp/payment-app-secret.env
        run: |
          set -euo pipefail

          SECRET_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "${PAYMENT_APP_SECRET_NAME_DEV}" \
            --query 'SecretString' \
            --output text)

          export SECRET_JSON PAYMENT_APP_ENV_FILE
          python - <<'PY'
          import json
          import os
          import sys

          secret = json.loads(os.environ["SECRET_JSON"])
          env_file = os.environ["PAYMENT_APP_ENV_FILE"]
          required_keys = [
              "PAYMENT_MODE",
              "WOMPI_PUBLIC_KEY",
              "WOMPI_PRIVATE_KEY",
              "WOMPI_INTEGRITY_SECRET",
              "WOMPI_EVENTS_SECRET",
              "WOMPI_BASE_URL",
              "RABBITMQ_HOST",
              "RABBITMQ_PORT",
              "RABBITMQ_USER",
              "RABBITMQ_PASS",
          ]
          missing = [key for key in required_keys if key not in secret]
          if missing:
              print("::error::Payment app secret is missing required keys: " + ", ".join(missing))
              sys.exit(1)

          with open(env_file, "w", encoding="utf-8") as fh:
              for key in required_keys:
                  value = secret.get(key, "")
                  fh.write(f"{key}={value}\n")
          PY

          kubectl create secret generic payment-app-secret \
            --namespace "${K8S_NAMESPACE_DEV}" \
            --from-env-file="${PAYMENT_APP_ENV_FILE}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${SERVICE_MANIFEST}"
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${RENDERED_DEPLOYMENT_MANIFEST}"

      - name: Apply booking saga worker manifest
        if: ${{ matrix.service_name == 'booking' }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys

          src = os.environ["SAGA_WORKER_DEPLOYMENT_MANIFEST"]
          dst = os.environ["RENDERED_SAGA_WORKER_DEPLOYMENT_MANIFEST"]
          registry = os.environ.get("ECR_REGISTRY_DEV", "")
          sha = os.environ.get("GITHUB_SHA", "")

          try:
              with open(src, "r", encoding="utf-8") as f:
                  content = f.read()
          except Exception as exc:
              print(f"::error file={src}::Failed to read saga worker manifest: {exc}")
              sys.exit(1)

          rendered = content.replace("${ECR_REGISTRY_DEV}", registry)
          rendered = rendered.replace("${GITHUB_SHA}", sha)

          if "${ECR_REGISTRY_DEV}" in rendered or "${GITHUB_SHA}" in rendered:
              print("::error::Saga worker manifest still contains unresolved placeholders after rendering.")
              sys.exit(1)

          with open(dst, "w", encoding="utf-8") as f:
              f.write(rendered)
          PY
          kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${RENDERED_SAGA_WORKER_DEPLOYMENT_MANIFEST}"

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail
          kubectl rollout status "deployment/${SERVICE_NAME}" \
            --namespace "${K8S_NAMESPACE_DEV}" \
            --timeout=300s

          if [ "${SERVICE_NAME}" = "booking" ]; then
            kubectl rollout status "deployment/booking-saga-worker" \
              --namespace "${K8S_NAMESPACE_DEV}" \
              --timeout=300s
          fi

      - name: Verify service response (port-forward)
        shell: bash
        run: |
          set -euo pipefail

          kubectl port-forward "svc/${SERVICE_NAME}" 8080:80 -n "${K8S_NAMESPACE_DEV}" &
          PF_PID=$!

          cleanup() {
            kill "${PF_PID}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT
          sleep 5
          curl -f "http://localhost:8080${HEALTHCHECK_PATH}"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [discover-services, deploy-service-prod]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Release Body
        id: release_body
        shell: bash
        run: |
          echo "### Docker Images" > release_body.txt
          echo "| Service | Image URI |" >> release_body.txt
          echo "| :--- | :--- |" >> release_body.txt
          
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          
          # Discover services again to list them
          SERVICES=$(echo '${{ needs.discover-services.outputs.matrix }}' | jq -c '.include[]')
          for row in $SERVICES; do
            NAME=$(echo ${row} | jq -r '.service_name')
            IMAGE="${REGISTRY}/${NAME}:${GITHUB_SHA}"
            echo "| ${NAME} | `${IMAGE}` |" >> release_body.txt
          done
          
          # Escape newlines for GITHUB_OUTPUT
          BODY=$(cat release_body.txt)
          BODY="${BODY//'%'/'%25'}"
          BODY="${BODY//$'\n'/'%0A'}"
          BODY="${BODY//$'\r'/'%0D'}"
          echo "body=${BODY}" >> $GITHUB_OUTPUT
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_body.outputs.body }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
