<div class="processing-reservation-page">
  <app-header></app-header>

  <main class="processing-content">
    <section class="processing-card" data-testid="processing-reservation-card">
      <div class="spinner" aria-hidden="true"></div>
      <h1 class="processing-title">{{ 'processing.title' | translate }}</h1>
      <p class="processing-message" data-testid="processing-reservation-message">
        {{ message() }}
      </p>
      <p class="processing-status" data-testid="processing-reservation-status">
        {{ 'processing.status' | translate }} <strong>{{ status() }}</strong>
      </p>

      @if (!isPolling() && status() === 'CONFIRMADA') {
        <a class="processing-action" [routerLink]="['/booking', reservationId]">{{ 'processing.backToCart' | translate }}</a>
      }
    </section>
  </main>

  <app-footer></app-footer>
</div>
