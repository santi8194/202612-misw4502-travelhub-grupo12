name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/authservice/**'
      - 'Infraestructura/k8s/aws/authservice-*.yaml'
      - '.github/workflows/backend-cd.yml'
  workflow_dispatch:

concurrency:
  group: backend-cd-authservice-dev
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  SERVICE_FOLDER: Backend/authservice
  DOCKERFILE_PATH: Backend/authservice/Dockerfile
  DEPLOYMENT_MANIFEST: Infraestructura/k8s/aws/authservice-deployment.yaml
  SERVICE_MANIFEST: Infraestructura/k8s/aws/authservice-service.yaml
  RENDERED_DEPLOYMENT_MANIFEST: /tmp/authservice-deployment.rendered.yaml
  SERVICE_NAME: authservice
  ECR_REPOSITORY: authservice
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY_DEV: ${{ vars.ECR_REGISTRY_DEV }}
  AWS_ROLE_ARN_DEV: ${{ vars.AWS_ROLE_ARN_DEV }}
  EKS_CLUSTER_NAME_DEV: ${{ vars.EKS_CLUSTER_NAME_DEV }}
  K8S_NAMESPACE_DEV: ${{ vars.K8S_NAMESPACE_DEV }}

jobs:
  deploy-authservice:
    name: Deploy authservice to EKS
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${DOCKERFILE_PATH}" ]; then
            echo "::error file=${DOCKERFILE_PATH}::Missing Dockerfile for authservice. Expected file '${DOCKERFILE_PATH}' was not found."
            exit 1
          fi

          if [ ! -f "${DEPLOYMENT_MANIFEST}" ]; then
            echo "::error file=${DEPLOYMENT_MANIFEST}::Missing Kubernetes Deployment manifest. Expected file '${DEPLOYMENT_MANIFEST}' was not found."
            exit 1
          fi

          if [ ! -f "${SERVICE_MANIFEST}" ]; then
            echo "::error file=${SERVICE_MANIFEST}::Missing Kubernetes Service manifest. Expected file '${SERVICE_MANIFEST}' was not found."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install PyYAML

      - name: Validate required GitHub variables
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION:-}" ]; then
            echo "::error::Missing required GitHub variable 'AWS_REGION'."
            exit 1
          fi

          if [ -z "${ECR_REGISTRY_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'ECR_REGISTRY_DEV'."
            exit 1
          fi

          if [ -z "${AWS_ROLE_ARN_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'AWS_ROLE_ARN_DEV'."
            exit 1
          fi

          if [ -z "${EKS_CLUSTER_NAME_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'EKS_CLUSTER_NAME_DEV'."
            exit 1
          fi

          if [ -z "${K8S_NAMESPACE_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'K8S_NAMESPACE_DEV'."
            exit 1
          fi

      - name: Validate manifest naming and image template
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sys
          import yaml

          expected = "authservice"
          expected_image = "${ECR_REGISTRY_DEV}/authservice:${GITHUB_SHA}"
          deployment_file = "Infraestructura/k8s/aws/authservice-deployment.yaml"
          service_file = "Infraestructura/k8s/aws/authservice-service.yaml"

          try:
              with open(deployment_file, "r", encoding="utf-8") as f:
                  dep = yaml.safe_load(f)
              with open(service_file, "r", encoding="utf-8") as f:
                  svc = yaml.safe_load(f)
          except Exception as exc:
              print(f"::error::Failed to parse Kubernetes manifests: {exc}")
              sys.exit(1)

          try:
              dep_name = dep["metadata"]["name"]
              container = dep["spec"]["template"]["spec"]["containers"][0]
              container_name = container["name"]
              image_value = container["image"]
              service_name = svc["metadata"]["name"]
          except Exception as exc:
              print(f"::error::Manifest structure is invalid or missing required fields: {exc}")
              sys.exit(1)

          if dep_name != expected:
              print(f"::error file={deployment_file}::Deployment name mismatch. Expected '{expected}', found '{dep_name}'.")
              sys.exit(1)

          if container_name != expected:
              print(f"::error file={deployment_file}::Container name mismatch. Expected '{expected}', found '{container_name}'.")
              sys.exit(1)

          if service_name != expected:
              print(f"::error file={service_file}::Service name mismatch. Expected '{expected}', found '{service_name}'.")
              sys.exit(1)

          if image_value != expected_image:
              print(f"::error file={deployment_file}::Image template mismatch. Expected '{expected_image}', found '{image_value}'.")
              sys.exit(1)

          print("Manifest naming and image template OK")
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN_DEV }}
          role-session-name: gha-backend-cd-authservice-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "::error::ECR repository '${ECR_REPOSITORY}' does not exist in region '${AWS_REGION}'. Run infrastructure CD (Terraform) before backend deployment."
            exit 1
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker build \
            -f "${DOCKERFILE_PATH}" \
            -t "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:${GITHUB_SHA}" \
            -t "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:latest" \
            "${SERVICE_FOLDER}"; then
            echo "::error::Docker build failed for service '${SERVICE_NAME}' using Dockerfile '${DOCKERFILE_PATH}'."
            exit 1
          fi

      - name: Push Docker image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker push "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:${GITHUB_SHA}"; then
            echo "::error::Failed to push image tag '${GITHUB_SHA}' to ECR repository '${ECR_REPOSITORY}'."
            exit 1
          fi

          if ! docker push "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:latest"; then
            echo "::error::Failed to push image tag 'latest' to ECR repository '${ECR_REPOSITORY}'."
            exit 1
          fi

      - name: Render deployment manifest with ECR registry and SHA
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys

          src = "Infraestructura/k8s/aws/authservice-deployment.yaml"
          dst = "/tmp/authservice-deployment.rendered.yaml"
          registry = os.environ.get("ECR_REGISTRY_DEV", "")
          sha = os.environ.get("GITHUB_SHA", "")

          if not registry:
              print("::error::ECR_REGISTRY_DEV is required to render the deployment manifest.")
              sys.exit(1)

          if not sha:
              print("::error::GITHUB_SHA is required to render the deployment manifest.")
              sys.exit(1)

          try:
              with open(src, "r", encoding="utf-8") as f:
                  content = f.read()
          except Exception as exc:
              print(f"::error file={src}::Failed to read deployment manifest: {exc}")
              sys.exit(1)

          rendered = content.replace("${ECR_REGISTRY_DEV}", registry)
          rendered = rendered.replace("${GITHUB_SHA}", sha)

          if "${ECR_REGISTRY_DEV}" in rendered or "${GITHUB_SHA}" in rendered:
              print("::error::Deployment manifest still contains unresolved placeholders after rendering.")
              sys.exit(1)

          try:
              with open(dst, "w", encoding="utf-8") as f:
                  f.write(rendered)
          except Exception as exc:
              print(f"::error file={dst}::Failed to write rendered deployment manifest: {exc}")
              sys.exit(1)

          print(f"Rendered deployment manifest written to {dst}")
          PY

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          if ! aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME_DEV}" \
            --region "${AWS_REGION}"; then
            echo "::error::Failed to update kubeconfig for EKS cluster '${EKS_CLUSTER_NAME_DEV}' in region '${AWS_REGION}'."
            exit 1
          fi

      - name: Ensure namespace exists
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl get namespace "${K8S_NAMESPACE_DEV}" >/dev/null 2>&1; then
            if ! kubectl create namespace "${K8S_NAMESPACE_DEV}"; then
              echo "::error::Failed to create namespace '${K8S_NAMESPACE_DEV}'."
              exit 1
            fi
          fi

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${SERVICE_MANIFEST}"; then
            echo "::error file=${SERVICE_MANIFEST}::Failed to apply Service manifest."
            exit 1
          fi

          if ! kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${RENDERED_DEPLOYMENT_MANIFEST}"; then
            echo "::error file=${RENDERED_DEPLOYMENT_MANIFEST}::Failed to apply rendered Deployment manifest."
            exit 1
          fi

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl rollout status deployment/authservice \
            --namespace "${K8S_NAMESPACE_DEV}" \
            --timeout=300s; then
            echo "::error::Rollout did not complete successfully for deployment 'authservice' in namespace '${K8S_NAMESPACE_DEV}'."
            exit 1
          fi

      - name: Verify service response (port-forward)
        shell: bash
        run: |
          set -euo pipefail

          kubectl port-forward svc/authservice 8080:80 -n "${K8S_NAMESPACE_DEV}" &
          PF_PID=$!

          cleanup() {
            kill "${PF_PID}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          sleep 5

          if ! curl -f http://localhost:8080/; then
            echo "::error::Service did not respond correctly on / endpoint"
            exit 1
          fi
