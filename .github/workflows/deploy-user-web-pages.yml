name: Deploy user-web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-user-web-pages.yml'
      - 'Frontend/user-web/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/user-web/package-lock.json

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: Frontend/user-web
        run: npm ci

      - name: Build application
        working-directory: Frontend/user-web
        run: npm run build -- --base-href "/202612-misw4502-travelhub-grupo12/"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Frontend/user-web/dist/user-web/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
