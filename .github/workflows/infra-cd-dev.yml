name: Infra CD DEV

on:
  workflow_call:

permissions:
  contents: read

env:
  TERRAFORM_VERSION: '1.10.0'
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'
  AWS_REGION: us-east-1

jobs:
  deploy-container-registry:
    name: Deploy container_registry
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/container_registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/container_registry/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-database:
    name: Deploy database
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-container-registry
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/database

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure -backend-config="../../environments/dev/database/backend.tfvars"

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/database/terraform.tfvars" -var-file="database.secrets.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-ec2:
    name: Deploy ec2
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-database
    defaults:
      run:
        shell: bash
        working-directory: Infraestructura/terraform/stacks/ec2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -reconfigure -backend-config="../../environments/dev/ec2/backend.tfvars"

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file="../../environments/dev/ec2/dev.tfvars" -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
