name: travelhub-dev

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: travelhub-nginx
    ports:
      - "${NGINX_PUBLISHED_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      authservice:
        condition: service_healthy
      booking:
        condition: service_healthy
      catalog:
        condition: service_healthy
      search:
        condition: service_healthy
      payment:
        condition: service_healthy
      pms-integration:
        condition: service_healthy
      partner-management:
        condition: service_healthy
      notification:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  authservice:
    image: ${ECR_REGISTRY_DEV}/authservice:${AUTHSERVICE_IMAGE_TAG:-latest}
    container_name: travelhub-authservice
    environment:
      SECRET_KEY: ${AUTHSERVICE_SECRET_KEY}
      DB_HOST: ${AUTHSERVICE_DB_HOST}
      DB_PORT: ${AUTHSERVICE_DB_PORT}
      DB_NAME: ${AUTHSERVICE_DB_NAME}
      DB_USER: ${AUTHSERVICE_DB_USER}
      DB_PASSWORD: ${AUTHSERVICE_DB_PASSWORD}
      COGNITO_REGION: ${COGNITO_REGION:-}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      COGNITO_CLIENT_SECRET: ${COGNITO_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  catalog:
    image: ${ECR_REGISTRY_DEV}/catalog:${CATALOG_IMAGE_TAG:-latest}
    container_name: travelhub-catalog
    environment:
      DB_HOST: ${CATALOG_DB_HOST}
      DB_PORT: ${CATALOG_DB_PORT}
      DB_NAME: ${CATALOG_DB_NAME}
      DB_USER: ${CATALOG_DB_USER}
      DB_PASSWORD: ${CATALOG_DB_PASSWORD}
      ENABLE_EVENTS: "false"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  booking:
    image: ${ECR_REGISTRY_DEV}/booking:${BOOKING_IMAGE_TAG:-latest}
    container_name: travelhub-booking
    environment:
      BOOKING_DB_MODE: postgres
      DB_HOST: ${BOOKING_DB_HOST}
      DB_PORT: ${BOOKING_DB_PORT}
      DB_NAME: ${BOOKING_DB_NAME}
      DB_USER: ${BOOKING_DB_USER}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      CATALOG_SERVICE_URL: ${BOOKING_CATALOG_SERVICE_URL}
      PAYMENT_SERVICE_URL: ${BOOKING_PAYMENT_SERVICE_URL:-http://payment:8002}
      PAYMENT_MODE: ${PAYMENT_MODE:-wompi}
      BOOKING_INSTANCE_PATH: /src/instance
    depends_on:
      catalog:
        condition: service_healthy
      rabbitmq-broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  search:
    image: ${ECR_REGISTRY_DEV}/search:${SEARCH_IMAGE_TAG:-latest}
    container_name: travelhub-search
    environment:
      REPOSITORY_TYPE: ${SEARCH_REPOSITORY_TYPE:-postgres}
      DB_HOST: ${SEARCH_DB_HOST}
      DB_PORT: ${SEARCH_DB_PORT}
      DB_NAME: ${SEARCH_DB_NAME}
      DB_USER: ${SEARCH_DB_USER}
      DB_PASSWORD: ${SEARCH_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  payment:
    image: ${ECR_REGISTRY_DEV}/payment:${PAYMENT_IMAGE_TAG:-latest}
    container_name: travelhub-payment
    environment:
      PAYMENT_DB_HOST: ${PAYMENT_DB_HOST:-}
      PAYMENT_DB_PORT: ${PAYMENT_DB_PORT:-}
      PAYMENT_DB_NAME: ${PAYMENT_DB_NAME:-}
      PAYMENT_DB_USER: ${PAYMENT_DB_USER:-}
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:-}
      PAYMENT_MODE: ${PAYMENT_MODE:-wompi}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET:-}
      WOMPI_BASE_URL: ${WOMPI_BASE_URL:-}
      WOMPI_PAYOUTS_BASE_URL: ${WOMPI_PAYOUTS_BASE_URL:-}
      RABBITMQ_HOST: ${PAYMENT_RABBITMQ_HOST:-rabbitmq-broker}
      RABBITMQ_PORT: ${PAYMENT_RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${PAYMENT_RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${PAYMENT_RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      rabbitmq-broker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  pms-integration:
    image: ${ECR_REGISTRY_DEV}/pms-integration:${PMS_INTEGRATION_IMAGE_TAG:-latest}
    container_name: travelhub-pms-integration
    environment:
      PMS_DB_HOST: ${PMS_DB_HOST:-}
      PMS_DB_PORT: ${PMS_DB_PORT:-}
      PMS_DB_NAME: ${PMS_DB_NAME:-}
      PMS_DB_USER: ${PMS_DB_USER:-}
      PMS_DB_PASSWORD: ${PMS_DB_PASSWORD:-}
      RABBITMQ_HOST: ${PMS_RABBITMQ_HOST:-rabbitmq-broker}
      RABBITMQ_PORT: ${PMS_RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${PMS_RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${PMS_RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      rabbitmq-broker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  partner-management:
    image: ${ECR_REGISTRY_DEV}/partner-management:${PARTNER_MANAGEMENT_IMAGE_TAG:-latest}
    container_name: travelhub-partner-management
    environment:
      PARTNER_DB_HOST: ${PARTNER_DB_HOST:-}
      PARTNER_DB_PORT: ${PARTNER_DB_PORT:-}
      PARTNER_DB_NAME: ${PARTNER_DB_NAME:-}
      PARTNER_DB_USER: ${PARTNER_DB_USER:-}
      PARTNER_DB_PASSWORD: ${PARTNER_DB_PASSWORD:-}
      RABBITMQ_HOST: ${PARTNER_RABBITMQ_HOST:-rabbitmq-broker}
      RABBITMQ_PORT: ${PARTNER_RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${PARTNER_RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${PARTNER_RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      rabbitmq-broker:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  notification:
    image: ${ECR_REGISTRY_DEV}/notification:${NOTIFICATION_IMAGE_TAG:-latest}
    container_name: travelhub-notification
    environment:
      NOTIFICATION_DB_HOST: ${NOTIFICATION_DB_HOST:-}
      NOTIFICATION_DB_PORT: ${NOTIFICATION_DB_PORT:-}
      NOTIFICATION_DB_NAME: ${NOTIFICATION_DB_NAME:-}
      NOTIFICATION_DB_USER: ${NOTIFICATION_DB_USER:-}
      NOTIFICATION_DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD:-}
      RABBITMQ_HOST: ${NOTIFICATION_RABBITMQ_HOST:-rabbitmq-broker}
      RABBITMQ_PORT: ${NOTIFICATION_RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${NOTIFICATION_RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${NOTIFICATION_RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      rabbitmq-broker:
        condition: service_healthy
      redis-db:
        condition: service_started
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  rabbitmq-broker:
    image: rabbitmq:3.13-management-alpine
    container_name: travelhub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  redis-db:
    image: redis:7-alpine
    container_name: travelhub-redis
    restart: unless-stopped
    networks:
      - travelhub-dev-net

  booking-saga-worker:
    image: ${ECR_REGISTRY_DEV}/booking:${BOOKING_IMAGE_TAG:-latest}
    container_name: travelhub-booking-saga-worker
    entrypoint: ["python", "/src/Booking/modulos/saga_reservas/infraestructura/consumidor_evt_saga.py"]
    environment:
      REDIS_HOST: redis-db
      RABBITMQ_HOST: rabbitmq-broker
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      PYTHONPATH: /src
      PYTHONUNBUFFERED: "1"
      BOOKING_DB_MODE: postgres
      BOOKING_INSTANCE_PATH: /src/instance
      DB_HOST: ${BOOKING_DB_HOST}
      DB_PORT: ${BOOKING_DB_PORT}
      DB_NAME: ${BOOKING_DB_NAME}
      DB_USER: ${BOOKING_DB_USER}
      DB_PASSWORD: ${BOOKING_DB_PASSWORD}
      PAYMENT_MODE: ${PAYMENT_MODE:-wompi}
    depends_on:
      booking:
        condition: service_healthy
      payment:
        condition: service_healthy
      pms-integration:
        condition: service_healthy
      partner-management:
        condition: service_healthy
      notification:
        condition: service_healthy
      rabbitmq-broker:
        condition: service_healthy
      redis-db:
        condition: service_started
    restart: unless-stopped
    networks:
      - travelhub-dev-net

networks:
  travelhub-dev-net:
    driver: bridge
