name: Backend CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Backend/**'
      - 'Infraestructura/k8s/aws/*-deployment.yaml'
      - 'Infraestructura/k8s/aws/*-service.yaml'
      - 'Infraestructura/k8s/aws/ingress.yaml'
      - '.github/workflows/backend-cd.yml'
      - '.github/backend-cd.exclusions.json'
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY_DEV: ${{ vars.ECR_REGISTRY_DEV }}
  EKS_CLUSTER_NAME_DEV: ${{ vars.EKS_CLUSTER_NAME_DEV }}
  K8S_NAMESPACE_DEV: ${{ vars.K8S_NAMESPACE_DEV }}
  INGRESS_MANIFEST: Infraestructura/k8s/aws/ingress.yaml
  SERVICE_EXCLUSIONS_FILE: .github/backend-cd.exclusions.json

jobs:
  discover-services:
    name: Discover changed services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      service_count: ${{ steps.discover.outputs.service_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build deployment matrix
        id: discover
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import subprocess
          import sys

          exclusions_path = os.environ["SERVICE_EXCLUSIONS_FILE"]
          event_name = os.environ["EVENT_NAME"]
          base_sha = os.environ.get("BASE_SHA", "")
          head_sha = os.environ["HEAD_SHA"]
          repo_root = Path.cwd()
          backend_dir = repo_root / "Backend"
          manifests_dir = repo_root / "Infraestructura" / "k8s" / "aws"

          try:
              with open(exclusions_path, "r", encoding="utf-8") as fh:
                  exclusions = json.load(fh)
          except Exception as exc:
              print(f"::error file={exclusions_path}::Failed to load exclusion list: {exc}")
              sys.exit(1)

          excluded_services = set(exclusions.get("exclude", []))

          deploy_all = False
          changed_files: list[str] = []

          if event_name == "workflow_dispatch":
              deploy_all = True
          elif not base_sha or base_sha == "0000000000000000000000000000000000000000":
              deploy_all = True
          else:
              result = subprocess.run(
                  ["git", "diff", "--name-only", base_sha, head_sha],
                  check=True,
                  capture_output=True,
                  text=True,
              )
              changed_files = [line.strip() for line in result.stdout.splitlines() if line.strip()]

          discovered_services = []
          for service_dir in sorted(path for path in backend_dir.iterdir() if path.is_dir()):
              service_name = service_dir.name
              if service_name in excluded_services:
                  continue

              dockerfile = service_dir / "Dockerfile"
              deployment_manifest = manifests_dir / f"{service_name}-deployment.yaml"
              service_manifest = manifests_dir / f"{service_name}-service.yaml"

              has_dockerfile = dockerfile.is_file()
              has_deployment = deployment_manifest.is_file()
              has_service = service_manifest.is_file()

              if not has_dockerfile:
                  continue

              if not has_deployment or not has_service:
                  missing = []
                  if not has_deployment:
                      missing.append(str(deployment_manifest.relative_to(repo_root)).replace("\\", "/"))
                  if not has_service:
                      missing.append(str(service_manifest.relative_to(repo_root)).replace("\\", "/"))
                  missing_paths = ", ".join(missing)
                  print(
                      f"::warning::Service '{service_name}' has a Dockerfile but is not CD-supported because these manifests are missing: {missing_paths}"
                  )
                  continue

              discovered_services.append(service_name)

          if not discovered_services:
              print("::warning::No CD-supported services were discovered under Backend/.")

          selected_services = []
          global_change_prefixes = [
              ".github/workflows/backend-cd.yml",
              ".github/backend-cd.exclusions.json",
              "Infraestructura/k8s/aws/ingress.yaml",
          ]

          for service_name in discovered_services:
              service = {
                  "service_name": service_name,
                  "service_folder": f"Backend/{service_name}",
                  "dockerfile_path": f"Backend/{service_name}/Dockerfile",
                  "ecr_repository": service_name,
                  "deployment_manifest": f"Infraestructura/k8s/aws/{service_name}-deployment.yaml",
                  "service_manifest": f"Infraestructura/k8s/aws/{service_name}-service.yaml",
              }

              if deploy_all:
                  selected_services.append(service)
                  continue

              if any(path in changed_files for path in global_change_prefixes):
                  selected_services.append(service)
                  continue

              watch_paths = [
                  f"Backend/{service_name}/",
                  f"Infraestructura/k8s/aws/{service_name}-deployment.yaml",
                  f"Infraestructura/k8s/aws/{service_name}-service.yaml",
              ]

              if any(
                  changed.startswith(prefix)
                  for changed in changed_files
                  for prefix in watch_paths
              ):
                  selected_services.append(service)

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps({'include': selected_services})}\n")
              fh.write(f"service_count={len(selected_services)}\n")
          PY

  deploy-service:
    name: Deploy ${{ matrix.service_name }} to EKS
    runs-on: ubuntu-latest
    environment: dev
    needs: discover-services
    if: ${{ needs.discover-services.outputs.service_count != '0' }}
    concurrency:
      group: backend-cd-${{ matrix.service_name }}-dev
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-services.outputs.matrix) }}
    env:
      SERVICE_FOLDER: ${{ matrix.service_folder }}
      DOCKERFILE_PATH: ${{ matrix.dockerfile_path }}
      DEPLOYMENT_MANIFEST: ${{ matrix.deployment_manifest }}
      SERVICE_MANIFEST: ${{ matrix.service_manifest }}
      RENDERED_DEPLOYMENT_MANIFEST: /tmp/${{ matrix.service_name }}-deployment.rendered.yaml
      SERVICE_NAME: ${{ matrix.service_name }}
      ECR_REPOSITORY: ${{ matrix.ecr_repository }}
      HEALTHCHECK_PATH: /health

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "${DOCKERFILE_PATH}" ]; then
            echo "::error file=${DOCKERFILE_PATH}::Missing Dockerfile for service '${SERVICE_NAME}'. Expected file '${DOCKERFILE_PATH}' was not found."
            exit 1
          fi

          if [ ! -f "${DEPLOYMENT_MANIFEST}" ]; then
            echo "::error file=${DEPLOYMENT_MANIFEST}::Missing Kubernetes Deployment manifest. Expected file '${DEPLOYMENT_MANIFEST}' was not found."
            exit 1
          fi

          if [ ! -f "${SERVICE_MANIFEST}" ]; then
            echo "::error file=${SERVICE_MANIFEST}::Missing Kubernetes Service manifest. Expected file '${SERVICE_MANIFEST}' was not found."
            exit 1
          fi

          if [ ! -f "${INGRESS_MANIFEST}" ]; then
            echo "::error file=${INGRESS_MANIFEST}::Missing Kubernetes Ingress manifest. Expected file '${INGRESS_MANIFEST}' was not found."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install PyYAML

      - name: Validate required GitHub variables
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AWS_REGION:-}" ]; then
            echo "::error::Missing required GitHub variable 'AWS_REGION'."
            exit 1
          fi

          if [ -z "${ECR_REGISTRY_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'ECR_REGISTRY_DEV'."
            exit 1
          fi

          if [ -z "${EKS_CLUSTER_NAME_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'EKS_CLUSTER_NAME_DEV'."
            exit 1
          fi

          if [ -z "${K8S_NAMESPACE_DEV:-}" ]; then
            echo "::error::Missing required GitHub variable 'K8S_NAMESPACE_DEV'."
            exit 1
          fi

      - name: Validate manifest naming and image template
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys
          import yaml

          expected = os.environ["SERVICE_NAME"]
          expected_image = "${ECR_REGISTRY_DEV}/" + expected + ":${GITHUB_SHA}"
          deployment_file = os.environ["DEPLOYMENT_MANIFEST"]
          service_file = os.environ["SERVICE_MANIFEST"]

          try:
              with open(deployment_file, "r", encoding="utf-8") as f:
                  dep = yaml.safe_load(f)
              with open(service_file, "r", encoding="utf-8") as f:
                  svc = yaml.safe_load(f)
          except Exception as exc:
              print(f"::error::Failed to parse Kubernetes manifests: {exc}")
              sys.exit(1)

          try:
              dep_name = dep["metadata"]["name"]
              container = dep["spec"]["template"]["spec"]["containers"][0]
              container_name = container["name"]
              image_value = container["image"]
              service_name = svc["metadata"]["name"]
          except Exception as exc:
              print(f"::error::Manifest structure is invalid or missing required fields: {exc}")
              sys.exit(1)

          if dep_name != expected:
              print(f"::error file={deployment_file}::Deployment name mismatch. Expected '{expected}', found '{dep_name}'.")
              sys.exit(1)

          if container_name != expected:
              print(f"::error file={deployment_file}::Container name mismatch. Expected '{expected}', found '{container_name}'.")
              sys.exit(1)

          if service_name != expected:
              print(f"::error file={service_file}::Service name mismatch. Expected '{expected}', found '{service_name}'.")
              sys.exit(1)

          if image_value != expected_image:
              print(f"::error file={deployment_file}::Image template mismatch. Expected '{expected_image}', found '{image_value}'.")
              sys.exit(1)

          print("Manifest naming and image template OK")
          PY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate ECR repository exists
        shell: bash
        run: |
          set -euo pipefail

          if ! aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY}" \
            --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "::error::ECR repository '${ECR_REPOSITORY}' does not exist in region '${AWS_REGION}'. Run infrastructure CD (Terraform) before backend deployment."
            exit 1
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker build \
            -f "${DOCKERFILE_PATH}" \
            -t "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:${GITHUB_SHA}" \
            -t "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:latest" \
            "${SERVICE_FOLDER}"; then
            echo "::error::Docker build failed for service '${SERVICE_NAME}' using Dockerfile '${DOCKERFILE_PATH}'."
            exit 1
          fi

      - name: Push Docker image
        shell: bash
        run: |
          set -euo pipefail

          if ! docker push "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:${GITHUB_SHA}"; then
            echo "::error::Failed to push image tag '${GITHUB_SHA}' to ECR repository '${ECR_REPOSITORY}'."
            exit 1
          fi

          if ! docker push "${ECR_REGISTRY_DEV}/${ECR_REPOSITORY}:latest"; then
            echo "::error::Failed to push image tag 'latest' to ECR repository '${ECR_REPOSITORY}'."
            exit 1
          fi

      - name: Render deployment manifest with ECR registry and SHA
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import sys

          src = os.environ["DEPLOYMENT_MANIFEST"]
          dst = os.environ["RENDERED_DEPLOYMENT_MANIFEST"]
          registry = os.environ.get("ECR_REGISTRY_DEV", "")
          sha = os.environ.get("GITHUB_SHA", "")

          if not registry:
              print("::error::ECR_REGISTRY_DEV is required to render the deployment manifest.")
              sys.exit(1)

          if not sha:
              print("::error::GITHUB_SHA is required to render the deployment manifest.")
              sys.exit(1)

          try:
              with open(src, "r", encoding="utf-8") as f:
                  content = f.read()
          except Exception as exc:
              print(f"::error file={src}::Failed to read deployment manifest: {exc}")
              sys.exit(1)

          rendered = content.replace("${ECR_REGISTRY_DEV}", registry)
          rendered = rendered.replace("${GITHUB_SHA}", sha)

          if "${ECR_REGISTRY_DEV}" in rendered or "${GITHUB_SHA}" in rendered:
              print("::error::Deployment manifest still contains unresolved placeholders after rendering.")
              sys.exit(1)

          try:
              with open(dst, "w", encoding="utf-8") as f:
                  f.write(rendered)
          except Exception as exc:
              print(f"::error file={dst}::Failed to write rendered deployment manifest: {exc}")
              sys.exit(1)

          print(f"Rendered deployment manifest written to {dst}")
          PY

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          if ! aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME_DEV}" \
            --region "${AWS_REGION}"; then
            echo "::error::Failed to update kubeconfig for EKS cluster '${EKS_CLUSTER_NAME_DEV}' in region '${AWS_REGION}'."
            exit 1
          fi

      - name: Ensure namespace exists
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl get namespace "${K8S_NAMESPACE_DEV}" >/dev/null 2>&1; then
            if ! kubectl create namespace "${K8S_NAMESPACE_DEV}"; then
              echo "::error::Failed to create namespace '${K8S_NAMESPACE_DEV}'."
              exit 1
            fi
          fi

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${SERVICE_MANIFEST}"; then
            echo "::error file=${SERVICE_MANIFEST}::Failed to apply Service manifest."
            exit 1
          fi

          if ! kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${RENDERED_DEPLOYMENT_MANIFEST}"; then
            echo "::error file=${RENDERED_DEPLOYMENT_MANIFEST}::Failed to apply rendered Deployment manifest."
            exit 1
          fi

          if ! kubectl apply -n "${K8S_NAMESPACE_DEV}" -f "${INGRESS_MANIFEST}"; then
            echo "::error file=${INGRESS_MANIFEST}::Failed to apply Ingress manifest."
            exit 1
          fi

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail

          if ! kubectl rollout status "deployment/${SERVICE_NAME}" \
            --namespace "${K8S_NAMESPACE_DEV}" \
            --timeout=300s; then
            echo "::error::Rollout did not complete successfully for deployment '${SERVICE_NAME}' in namespace '${K8S_NAMESPACE_DEV}'."
            exit 1
          fi

      - name: Verify service response (port-forward)
        shell: bash
        run: |
          set -euo pipefail

          kubectl port-forward "svc/${SERVICE_NAME}" 8080:80 -n "${K8S_NAMESPACE_DEV}" &
          PF_PID=$!

          cleanup() {
            kill "${PF_PID}" >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          sleep 5

          if ! curl -f "http://localhost:8080${HEALTHCHECK_PATH}"; then
            echo "::error::Service '${SERVICE_NAME}' did not respond correctly on endpoint '${HEALTHCHECK_PATH}'."
            exit 1
          fi
