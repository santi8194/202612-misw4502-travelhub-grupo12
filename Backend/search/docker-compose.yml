version: "3.9"

services:
  opensearch:
    image: opensearchproject/opensearch:2.17.1
    container_name: travelhub-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MyStr0ng!Pass#2026
      - plugins.security.ssl.http.enabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - travelhub-net

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.17.1
    container_name: travelhub-dashboards
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - travelhub-net

volumes:
  opensearch-data:

networks:
  travelhub-net:
    driver: bridge
