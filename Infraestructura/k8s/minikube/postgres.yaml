apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-bootstrap
  namespace: travelhub
data:
  01-init.sh: |
    #!/bin/sh
    set -eu

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres <<'EOSQL'
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'authservice_app') THEN
        CREATE ROLE authservice_app LOGIN PASSWORD 'authservice_dev';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'booking_app') THEN
        CREATE ROLE booking_app LOGIN PASSWORD 'booking_dev';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'catalog_app') THEN
        CREATE ROLE catalog_app LOGIN PASSWORD 'catalog_dev';
      END IF;
      IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'search_app') THEN
        CREATE ROLE search_app LOGIN PASSWORD 'search_dev';
      END IF;
    END
    $$;

    CREATE DATABASE authservice_db OWNER authservice_app;
    CREATE DATABASE booking_db OWNER booking_app;
    CREATE DATABASE catalog_db OWNER catalog_app;
    CREATE DATABASE search_db OWNER search_app;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname search_db <<'EOSQL'
    CREATE SCHEMA IF NOT EXISTS search AUTHORIZATION search_app;
    GRANT USAGE, CREATE ON SCHEMA search TO search_app;
    ALTER ROLE search_app IN DATABASE search_db SET search_path = search, public;
    EOSQL
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: travelhub
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: travelhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-admin-secret
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-bootstrap
              mountPath: /docker-entrypoint-initdb.d/01-init.sh
              subPath: 01-init.sh
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: postgres-bootstrap
          configMap:
            name: postgres-bootstrap
            defaultMode: 493
