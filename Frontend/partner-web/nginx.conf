server {
    listen 80;
    server_name localhost;
    
    # Directorio base donde están los archivos compilados
    root /usr/share/nginx/html;
    index index.html;

    # Regla principal para Single Page Applications (SPA)
    location / {
        # Intenta cargar el archivo o directorio; si falla, carga el index.html
        # Esto permite que las rutas de Angular sean manejadas localmente por el navegador
        try_files $uri $uri/ /index.html;
    }

    # Deshabilitar logs para archivos inexistentes muy comunes
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }

    # Opcional: Cachear assets estáticos (CSS, JS, imágenes)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
