name: Backend CD

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod

concurrency:
  group: backend-cd-${{ github.event_name == 'push' && 'dev' || github.event.inputs.environment }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECR_REGISTRY_DEV: ${{ vars.ECR_REGISTRY_DEV }}
  ECR_REGISTRY_STAGING: ${{ vars.ECR_REGISTRY_STAGING }}
  ECR_REGISTRY_PROD: ${{ vars.ECR_REGISTRY_PROD }}
  AWS_ROLE_ARN_DEV: ${{ vars.AWS_ROLE_ARN_DEV }}
  AWS_ROLE_ARN_STAGING: ${{ vars.AWS_ROLE_ARN_STAGING }}
  AWS_ROLE_ARN_PROD: ${{ vars.AWS_ROLE_ARN_PROD }}
  EKS_CLUSTER_NAME_DEV: ${{ vars.EKS_CLUSTER_NAME_DEV }}
  EKS_CLUSTER_NAME_STAGING: ${{ vars.EKS_CLUSTER_NAME_STAGING }}
  EKS_CLUSTER_NAME_PROD: ${{ vars.EKS_CLUSTER_NAME_PROD }}
  K8S_NAMESPACE_DEV: ${{ vars.K8S_NAMESPACE_DEV }}
  K8S_NAMESPACE_STAGING: ${{ vars.K8S_NAMESPACE_STAGING }}
  K8S_NAMESPACE_PROD: ${{ vars.K8S_NAMESPACE_PROD }}

jobs:
  discover-services:
    name: Discover Backend Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      service_count: ${{ steps.discover.outputs.service_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build service matrix
        id: discover
        shell: bash
        run: |
          mapfile -t services < <(find Backend -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          if [ "${#services[@]}" -eq 0 ]; then
            echo 'matrix={"service":[]}' >> "$GITHUB_OUTPUT"
            echo 'service_count=0' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          matrix_json=$(printf '%s\n' "${services[@]}" | jq -R . | jq -cs '{service: .}')

          echo "matrix=$matrix_json" >> "$GITHUB_OUTPUT"
          echo "service_count=${#services[@]}" >> "$GITHUB_OUTPUT"

  build-push-deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: discover-services
    if: ${{ needs.discover-services.outputs.service_count != '0' }}
    environment: ${{ github.event_name == 'push' && 'dev' || github.event.inputs.environment }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-services.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve deployment context
        id: context
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            target_env="dev"
          else
            target_env="${{ github.event.inputs.environment }}"
          fi

          case "$target_env" in
            dev)
              role_arn="${AWS_ROLE_ARN_DEV}"
              cluster_name="${EKS_CLUSTER_NAME_DEV}"
              namespace="${K8S_NAMESPACE_DEV}"
              registry="${ECR_REGISTRY_DEV:-${ECR_REGISTRY}}"
              ;;
            staging)
              role_arn="${AWS_ROLE_ARN_STAGING}"
              cluster_name="${EKS_CLUSTER_NAME_STAGING}"
              namespace="${K8S_NAMESPACE_STAGING}"
              registry="${ECR_REGISTRY_STAGING:-${ECR_REGISTRY}}"
              ;;
            prod)
              role_arn="${AWS_ROLE_ARN_PROD}"
              cluster_name="${EKS_CLUSTER_NAME_PROD}"
              namespace="${K8S_NAMESPACE_PROD}"
              registry="${ECR_REGISTRY_PROD:-${ECR_REGISTRY}}"
              ;;
            *)
              echo "::error::Unsupported environment '$target_env'."
              exit 1
              ;;
          esac

          if [ -z "$role_arn" ] || [ -z "$cluster_name" ] || [ -z "$namespace" ] || [ -z "$registry" ] || [ -z "${AWS_REGION}" ]; then
            echo "::error::Missing required GitHub variables for environment '$target_env'."
            exit 1
          fi

          echo "environment=$target_env" >> "$GITHUB_OUTPUT"
          echo "role_arn=$role_arn" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$cluster_name" >> "$GITHUB_OUTPUT"
          echo "namespace=$namespace" >> "$GITHUB_OUTPUT"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "image_repository=$registry/${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Validate service Dockerfile
        shell: bash
        run: |
          if [ ! -f "Backend/${{ matrix.service }}/Dockerfile" ]; then
            echo "::error::Missing Dockerfile for service '${{ matrix.service }}' at Backend/${{ matrix.service }}/Dockerfile."
            exit 1
          fi

      - name: Validate Kubernetes manifests
        shell: bash
        run: |
          if ! find Infraestructura/k8s -type f \( -name '*.yml' -o -name '*.yaml' \) | grep -q .; then
            echo "::error::No Kubernetes manifests found under Infraestructura/k8s."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.context.outputs.role_arn }}
          role-session-name: gha-backend-cd-${{ steps.context.outputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        shell: bash
        run: |
          docker build \
            -f "Backend/${{ matrix.service }}/Dockerfile" \
            -t "${{ steps.context.outputs.image_repository }}:${{ github.sha }}" \
            -t "${{ steps.context.outputs.image_repository }}:latest" \
            "Backend/${{ matrix.service }}"

      - name: Push Docker image
        shell: bash
        run: |
          docker push "${{ steps.context.outputs.image_repository }}:${{ github.sha }}"
          docker push "${{ steps.context.outputs.image_repository }}:latest"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        shell: bash
        run: |
          aws eks update-kubeconfig \
            --name "${{ steps.context.outputs.cluster_name }}" \
            --region "${AWS_REGION}"

      - name: Apply Kubernetes manifests
        shell: bash
        run: kubectl apply -f Infraestructura/k8s

      - name: Update deployment image
        shell: bash
        run: |
          kubectl set image "deployment/${{ matrix.service }}" \
            "${{ matrix.service }}=${{ steps.context.outputs.image_repository }}:${{ github.sha }}" \
            --namespace "${{ steps.context.outputs.namespace }}"

      - name: Wait for rollout
        shell: bash
        run: |
          kubectl rollout status "deployment/${{ matrix.service }}" \
            --namespace "${{ steps.context.outputs.namespace }}" \
            --timeout=300s
