name: Terraform CD

on:
  push:
    branches:
      - main
    paths:
      - 'Infraestructura/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: terraform-cd-${{ github.event_name }}-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
  TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX || 'infraestructura/terraform' }}
  TF_WORKING_DIR: Infraestructura/terraform
  TERRAFORM_VERSION: 1.8.5
  TF_IN_AUTOMATION: 'true'
  TF_INPUT: 'false'

jobs:
  deploy-dev:
    name: Deploy dev
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          role-session-name: gha-terraform-dev
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="workspace_key_prefix=${TF_STATE_KEY_PREFIX}"

      - name: Select workspace
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file=env/dev.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-staging:
    name: Deploy staging
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_STAGING }}
          role-session-name: gha-terraform-staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="workspace_key_prefix=${TF_STATE_KEY_PREFIX}"

      - name: Select workspace
        run: terraform workspace select staging || terraform workspace new staging

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file=env/staging.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

  deploy-prod:
    name: Deploy prod
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_PROD }}
          role-session-name: gha-terraform-prod
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="workspace_key_prefix=${TF_STATE_KEY_PREFIX}"

      - name: Select workspace
        run: terraform workspace select prod || terraform workspace new prod

      - name: Terraform plan
        run: terraform plan -input=false -no-color -var-file=env/prod.tfvars -out=tfplan

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan
